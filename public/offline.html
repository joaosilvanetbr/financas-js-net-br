<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b111a" />
    <title>Sem conexao — Financas</title>
    <style>
      * { box-sizing: border-box; margin: 0; }
      body {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #070b12;
        color: #e8f0f8;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        min-height: 100dvh;
        text-align: center;
        padding: 24px;
      }
      .offline-card {
        max-width: 360px;
        width: 100%;
        background: rgba(13, 21, 32, 0.72);
        backdrop-filter: blur(20px) saturate(1.4);
        -webkit-backdrop-filter: blur(20px) saturate(1.4);
        border: 1px solid #1e2d3f;
        border-radius: 16px;
        padding: 40px 32px;
      }
      .offline-icon {
        width: 64px;
        height: 64px;
        margin: 0 auto 20px;
        background: rgba(91, 155, 213, 0.12);
        border-radius: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .offline-icon svg {
        width: 32px;
        height: 32px;
        stroke: #5b9bd5;
      }
      h1 {
        font-size: 1.25rem;
        font-weight: 600;
        margin-bottom: 8px;
      }
      p {
        color: #8b9db5;
        font-size: 0.875rem;
        line-height: 1.5;
        margin-bottom: 24px;
      }
      .retry-button {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 24px;
        background: #5b9bd5;
        color: #070b12;
        font-weight: 600;
        font-size: 0.875rem;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: opacity 0.2s;
      }
      .retry-button:hover { opacity: 0.9; }
      .retry-button:active { transform: scale(0.98); }
      .retry-button svg {
        width: 16px;
        height: 16px;
      }
      .offline-note {
        margin-top: 16px;
        font-size: 0.75rem;
        color: rgba(139, 157, 181, 0.6);
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }
      .checking {
        animation: pulse 1.5s ease-in-out infinite;
      }
    </style>
  </head>
  <body>
    <div class="offline-card">
      <div class="offline-icon">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z" />
        </svg>
      </div>
      <h1>Sem conexao</h1>
      <p>Voce parece estar offline. Verifique sua conexao com a internet.</p>
      <button class="retry-button" onclick="checkConnection()">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182" />
        </svg>
        Tentar novamente
      </button>
      <p class="offline-note">Alguns dados podem estar disponiveis em cache.</p>
    </div>
    <script>
      function checkConnection() {
        const btn = document.querySelector('.retry-button');
        btn.classList.add('checking');
        btn.innerHTML = 'Verificando...';

        fetch('/', { method: 'HEAD', cache: 'no-store' })
          .then(() => { window.location.reload(); })
          .catch(() => {
            setTimeout(() => {
              btn.classList.remove('checking');
              btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182"/></svg> Tentar novamente`;
            }, 1000);
          });
      }

      // Auto-detectar quando voltar online
      window.addEventListener('online', () => {
        window.location.reload();
      });
    </script>
  </body>
</html>
